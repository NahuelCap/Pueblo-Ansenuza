<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Mozo</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="imagenes/fondo.jpg">

</head>

<body class="con-fondo-secundario">

<h1 class="titulo-cuadro">Ingreso de Mozo</h1>

<input id="nombre" placeholder="Nombre del mozo">

<br><br>

<button onclick="entrar()">Entrar</button>

<script>
function entrar(){
let nombre = document.getElementById("nombre").value.trim();

if(nombre === ""){
    alert("Ingrese nombre del Mozo");
    return;
}

sessionStorage.setItem("mozo", nombre);
window.location.href = "mesas.html";
}
</script>

</body>
</html>
