<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesas · Pueblo Ansenuza</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5EFE4; --sand: #C9A96E; --dark: #1E1208;
      --charcoal: #2D1F10; --muted: #9A8270;
      --libre:   #4A6741; --libre-bg:   rgba(74,103,65,.15);
      --ocupada: #C9A96E; --ocupada-bg: rgba(201,169,110,.15);
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--cream); }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 15% 10%, rgba(122,79,45,.28) 0%, transparent 55%),
                  radial-gradient(ellipse at 90% 90%, rgba(74,103,65,.18) 0%, transparent 50%);
      z-index: 0;
    }

    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      background: rgba(30,18,8,.75); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,169,110,.12);
      position: sticky; top: 0; z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(201,169,110,.25);
      background: transparent; color: var(--sand); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: .9rem; transition: all .2s;
    }
    .back-btn:hover { background: rgba(201,169,110,.12); }
    .header-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    .header-sub { font-size: .72rem; color: var(--muted); }

    .mozo-badge {
      display: flex; align-items: center; gap: .4rem;
      padding: .4rem .9rem; border-radius: 50px;
      background: rgba(201,169,110,.1); border: 1px solid rgba(201,169,110,.2);
      font-size: .78rem; color: var(--sand);
    }

    /* Leyenda */
    .legend {
      display: flex; gap: 1rem; flex-wrap: wrap;
      padding: .9rem 1.5rem;
      border-bottom: 1px solid rgba(201,169,110,.08);
    }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.libre   { background: var(--libre); }
    .dot.ocupada { background: var(--ocupada); }
    .dot.cuenta  { background: var(--cuenta); }

    /* Grid de mesas */
    main { flex: 1; padding: 1.2rem 1.5rem 2rem; }
    .section-label {
      font-size: .7rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: .9rem; margin-top: 1.2rem;
    }
    .mesa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: .85rem;
    }

    .mesa {
      position: relative;
      border-radius: 14px;
      border: 1px solid rgba(201,169,110,.12);
      background: rgba(45,31,16,.5);
      padding: 1.1rem .8rem .9rem;
      text-align: center;
      cursor: pointer;
      transition: transform .2s, border-color .2s, background .2s;
      animation: popIn .4s ease both;
    }
    .mesa:hover { transform: translateY(-2px); border-color: rgba(201,169,110,.3); }
    .mesa:active { transform: scale(.97); }

    .mesa.libre   { border-color: rgba(74,103,65,.3);   background: var(--libre-bg); }
    .mesa.ocupada { border-color: rgba(201,169,110,.3); background: var(--ocupada-bg); }
    .mesa.cuenta  { border-color: rgba(192,97,74,.4);   background: var(--cuenta-bg); }

    .mesa-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700; color: var(--cream);
    }
    .mesa-estado {
      font-size: .68rem; letter-spacing: .06em; margin-top: .3rem;
    }
    .libre   .mesa-estado { color: var(--libre); }
    .ocupada .mesa-estado { color: var(--ocupada); }
    .cuenta  .mesa-estado { color: var(--cuenta); }

    .mesa-mozo { font-size: .65rem; color: var(--muted); margin-top: .15rem; }

    .mesa-icon { font-size: 1.2rem; margin-bottom: .3rem; display: block; }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,6,2,.7); backdrop-filter: blur(6px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .overlay.active { display: flex; }

    .modal {
      width: 100%; max-width: 480px;
      background: var(--charcoal);
      border: 1px solid rgba(201,169,110,.2);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.5rem 2.5rem;
      animation: slideUp .3s ease;
    }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(201,169,110,.2); margin: 0 auto 1.2rem;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; margin-bottom: .3rem;
    }
    .modal-sub { font-size: .8rem; color: var(--muted); margin-bottom: 1.5rem; }

    .modal-actions { display: flex; flex-direction: column; gap: .7rem; }
    .action-btn {
      display: flex; align-items: center; gap: .9rem;
      padding: .95rem 1.1rem; border-radius: 12px;
      border: 1px solid rgba(201,169,110,.15);
      background: rgba(30,18,8,.4);
      color: var(--cream); font-size: .9rem; cursor: pointer;
      transition: background .2s, border-color .2s;
      width: 100%; text-align: left;
    }
    .action-btn:hover { background: rgba(201,169,110,.1); border-color: rgba(201,169,110,.3); }
    .action-btn.danger { border-color: rgba(192,97,74,.25); }
    .action-btn.danger:hover { background: rgba(192,97,74,.12); }
    .action-icon { font-size: 1.1rem; }
    .cancel-btn {
      width: 100%; margin-top: .3rem; padding: .8rem;
      background: transparent; border: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: .85rem; cursor: pointer;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <a href="index.html" class="back-btn">←</a>
      <div>
        <div class="header-title">Salón</div>
        <div class="header-sub">Estado de mesas</div>
      </div>
    </div>
    <div class="mozo-badge">👤 Mozo 1</div>
  </header>

  <div class="legend">
    <div class="legend-item"><span class="dot libre"></span> Libre</div>
    <div class="legend-item"><span class="dot ocupada"></span> Ocupada</div>
  </div>

  <main>
    <p class="section-label">Salón principal</p>
    <div class="mesa-grid" id="grid"><div class="mesa ocupada" style="animation-delay: 0s;">
        <span class="mesa-icon">🍽️</span>
        <div class="mesa-num">1</div>
        <div class="mesa-estado">Ocupada</div>
        <div class="mesa-mozo">Mozo 1</div>
      </div><div class="mesa libre" style="animation-delay: 0.04s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">2</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa ocupada" style="animation-delay: 0.08s;">
        <span class="mesa-icon">🍽️</span>
        <div class="mesa-num">3</div>
        <div class="mesa-estado">Ocupada</div>
        <div class="mesa-mozo">Mozo 2</div>
      </div><div class="mesa libre" style="animation-delay: 0.12s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">4</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa ocupada" style="animation-delay: 0.16s;">
        <span class="mesa-icon">🍽️</span>
        <div class="mesa-num">5</div>
        <div class="mesa-estado">Ocupada</div>
        <div class="mesa-mozo">Mozo 1</div>
      </div><div class="mesa libre" style="animation-delay: 0.2s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">6</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa ocupada" style="animation-delay: 0.24s;">
        <span class="mesa-icon">🍽️</span>
        <div class="mesa-num">7</div>
        <div class="mesa-estado">Ocupada</div>
        <div class="mesa-mozo">Mozo 2</div>
      </div><div class="mesa libre" style="animation-delay: 0.28s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">8</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa libre" style="animation-delay: 0.32s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">9</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa libre" style="animation-delay: 0.36s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">10</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa libre" style="animation-delay: 0.4s;">
        <span class="mesa-icon">🪑</span>
        <div class="mesa-num">11</div>
        <div class="mesa-estado">Libre</div>
        
      </div><div class="mesa ocupada" style="animation-delay: 0.44s;">
        <span class="mesa-icon">🍽️</span>
        <div class="mesa-num">12</div>
        <div class="mesa-estado">Ocupada</div>
        <div class="mesa-mozo">Mozo 2</div>
      </div></div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Mesa 1</div>
    <div class="modal-sub" id="modal-sub">Libre · Sin pedidos</div>
    <div class="modal-actions" id="modal-actions"></div>
    <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
  const mesas = [
    { n:1,  estado:'ocupada', mozo:'Mozo 1' },
    { n:2,  estado:'libre',   mozo:null },
    { n:3,  estado:'ocupada', mozo:'Mozo 2' },
    { n:4,  estado:'libre',   mozo:null },
    { n:5,  estado:'ocupada', mozo:'Mozo 1' },
    { n:6,  estado:'libre',   mozo:null },
    { n:7,  estado:'ocupada', mozo:'Mozo 2' },
    { n:8,  estado:'libre',   mozo:null },
    { n:9,  estado:'libre',   mozo:null },
    { n:10, estado:'libre',   mozo:null },
    { n:11, estado:'libre',   mozo:null },
    { n:12, estado:'ocupada', mozo:'Mozo 2' },
  ];

  const icons  = { libre:'🪑', ocupada:'🍽️' };
  const labels = { libre:'Libre', ocupada:'Ocupada' };

  let selected = null;

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    mesas.forEach((m, i) => {
      const el = document.createElement('div');
      el.className = `mesa ${m.estado}`;
      el.style.animationDelay = (i * .04) + 's';
      el.innerHTML = `
        <span class="mesa-icon">${icons[m.estado]}</span>
        <div class="mesa-num">${m.n}</div>
        <div class="mesa-estado">${labels[m.estado]}</div>
        ${m.mozo ? `<div class="mesa-mozo">${m.mozo}</div>` : ''}
      `;
      el.onclick = () => openModal(i);
      grid.appendChild(el);
    });
  }

  function openModal(i) {
    selected = i;
    const m = mesas[i];
    document.getElementById('modal-title').textContent = `Mesa ${m.n}`;
    document.getElementById('modal-sub').textContent =
      `${labels[m.estado]}${m.mozo ? ' · ' + m.mozo : ''}`;

    const actions = document.getElementById('modal-actions');
    actions.innerHTML = '';

    if (m.estado === 'libre') {
      btn(actions, '🍽️', 'Abrir mesa', () => setEstado(i, 'ocupada', 'Mozo 1'));
    }
    if (m.estado === 'ocupada') {
      btn(actions, '📝', 'Ver / agregar pedido', () => alert('Ir a pedidos...'));
      btn(actions, '✅', 'Cerrar mesa', () => setEstado(i, 'libre', null), true);
    }

    document.getElementById('overlay').classList.add('active');
  }

  function btn(parent, icon, label, fn, danger=false) {
    const b = document.createElement('button');
    b.className = 'action-btn' + (danger ? ' danger' : '');
    b.innerHTML = `<span class="action-icon">${icon}</span>${label}`;
    b.onclick = fn;
    parent.appendChild(b);
  }

  function setEstado(i, estado, mozo) {
    mesas[i].estado = estado;
    mesas[i].mozo   = mozo;
    closeModal();
    render();
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('active');
  }

  render();
</script>


</body></html>
