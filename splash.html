<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pueblo Ansenuza</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700;900&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:  #0F0B08;
      --gold: #C8A96E;
      --cream:#F2E8D9;
      --muted:#8A7560;
    }
    html, body {
      height: 100%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(200,169,110,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 70%, rgba(61,107,58,0.07) 0%, transparent 50%);
      pointer-events: none;
    }
    .splash {
      text-align: center;
      animation: fadeIn 0.6s ease both;
    }
    .logo-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      padding: 6px;
      margin: 0 auto 28px;
      box-shadow: 0 0 40px rgba(200,169,110,0.2);
      animation: scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .logo-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.9;
    }
    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: 0.06em;
      line-height: 1;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .splash-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
      animation: fadeUp 0.7s 0.35s ease both;
    }
    .splash-line {
      width: 0;
      height: 1px;
      background: var(--gold);
      margin: 22px auto;
      animation: expandLine 0.8s 0.5s ease both;
    }
    .splash-loader {
      display: flex;
      gap: 7px;
      justify-content: center;
      animation: fadeUp 0.5s 0.7s ease both;
    }
    .splash-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.3;
    }
    .splash-dot:nth-child(1) { animation: dotPulse 1.2s 0.8s infinite; }
    .splash-dot:nth-child(2) { animation: dotPulse 1.2s 1.0s infinite; }
    .splash-dot:nth-child(3) { animation: dotPulse 1.2s 1.2s infinite; }

    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn   { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
    @keyframes expandLine{ from { width:0; } to { width:60px; } }
    @keyframes dotPulse  { 0%,100%{ opacity:0.2; transform:scale(0.8); } 50%{ opacity:1; transform:scale(1.2); } }

    /* Fade out antes de redirigir */
    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeOut { to { opacity:0; transform:scale(1.03); } }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="logo-ring">
      <img src="imagenes/fondo.jpg" alt="Logo">
    </div>
    <div class="splash-title">PUEBLO<br>ANSENUZA</div>
    <div class="splash-sub">Restaurante &amp; Parrilla</div>
    <div class="splash-line"></div>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <script>
    setTimeout(() => {
      document.getElementById("splash").classList.add("fade-out");
      setTimeout(() => { window.location.href = "index.html"; }, 500);
    }, 2400);
  </script>
</body>
</html>
